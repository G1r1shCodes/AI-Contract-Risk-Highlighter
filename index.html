<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEXSCAN — AI Contract Risk Highlighter</title>
    <meta name="description" content="AI-powered contract risk analysis. Upload PDF, DOCX, or TXT contracts and get instant risk highlighting, scoring, and Q&A." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      
      :root {
        --bg-main: #0B0D12;
        --bg-panel: #13161D;
        --bg-panel-hover: #1E2028;
        --border-main: #222530;
        --border-light: #2A2D38;
        --text-main: #E8E4DC;
        --text-muted: #9A9DB0;
        --text-dim: #555A6A;
        --accent-gold: #C8A96E;
        --accent-gold-dark: #8B6914;
        --glass-bg: rgba(11, 13, 18, 0.7);
        --glass-border: rgba(255, 255, 255, 0.05);
      }

      body.light-theme {
        --bg-main: #E2E8F0; /* Deepen backing so White panels strictly pop */
        --bg-panel: #FFFFFF;
        --bg-panel-hover: #F1F5F9;
        --border-main: #94A3B8; /* Much darker structural lines */
        --border-light: #CBD5E1;
        --text-main: #0F172A;
        --text-muted: #1E293B;
        --text-dim: #334155;
        --accent-gold: #B48530;
        --accent-gold-dark: #7A5313;
        --glass-bg: rgba(255, 255, 255, 0.95);
        --glass-border: rgba(0, 0, 0, 0.18); /* Strong physical outlines */
      }

      body {
        background: var(--bg-main) !important;
        color: var(--text-main) !important;
        transition: background-color 0.4s ease, color 0.4s ease;
      }
      
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

      /* Focus rings */
      input:focus, textarea:focus {
        outline: none;
        border-color: var(--accent-gold) !important;
        box-shadow: 0 0 0 2px rgba(200, 169, 110, 0.12) !important;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      /* Button active press */
      button:active:not(:disabled) { transform: scale(0.97); }

      /* Selection highlight */
      ::selection { background: rgba(200, 169, 110, 0.25); color: var(--text-main); }

      /* Smooth anchor transitions */
      * { box-sizing: border-box; }

      /* Typing cursor blink */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Skeleton shimmer */
      @keyframes shimmer {
        0% { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .skeleton {
        background: linear-gradient(90deg, var(--bg-panel-hover) 25%, var(--border-main) 50%, var(--bg-panel-hover) 75%);
        background-size: 400px 100%;
        animation: shimmer 1.4s ease-in-out infinite;
        border-radius: 6px;
      }

      /* Fade-in for cards */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fadeUp 0.3s ease both; }

      /* Smooth mark transition */
      mark { transition: background 0.2s, color 0.2s; }

      /* Contract text link-style highlighting */
      mark:hover { filter: brightness(1.08); }
      
      @media print {
        body { background: white !important; color: black !important; padding: 20px !important; }
        /* Hide everything except the actual Risk components */
        button, input, textarea { display: none !important; }
        
        /* Force scrollable containers to perfectly spill their heights for native A4 pagination */
        #root, div { height: auto !important; overflow: visible !important; min-height: auto !important; position: static !important; }
        
        .risk-clause { page-break-inside: avoid; border: 1px solid #ddd !important; background: #fff !important; color: #000 !important; box-shadow: none !important; margin-bottom: 20px !important; }
        .risk-score-box { border: 2px solid #000 !important; background: #fff !important; color: #000 !important; page-break-inside: avoid; }
        h1, h2, h3, h4, span, div, p { color: black !important; }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
