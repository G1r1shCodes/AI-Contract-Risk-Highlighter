<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>LEXSCAN — AI Contract Risk Highlighter</title>
    <meta name="description" content="AI-powered contract risk analysis. Upload PDF, DOCX, or TXT contracts and get instant risk highlighting, scoring, and Q&A." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');
      
      :root {
        --bg-main: #0B0D12;
        --bg-panel: #13161D;
        --bg-panel-hover: #1E2028;
        --border-main: #222530;
        --border-light: #2A2D38;
        --text-main: #E8E4DC;
        --text-muted: #9A9DB0;
        --text-dim: #555A6A;
        --accent-gold: #C8A96E;
        --accent-gold-dark: #8B6914;
        --glass-bg: rgba(11, 13, 18, 0.7);
        --glass-border: rgba(255, 255, 255, 0.05);
      }

      body.light-theme {
        /* Warm parchment — legal-document feel, complements gold accent */
        --bg-main: #F5F3EE;
        --bg-panel: #FFFFFF;
        --bg-panel-hover: #F9F7F4;
        --border-main: #DDD8CF;
        --border-light: #E8E4DC;
        --text-main: #1A1714;
        --text-muted: #3D3830;
        --text-dim: #857F76;
        --accent-gold: #9A6F2E;
        --accent-gold-dark: #6B4D1F;
        --glass-bg: rgba(245, 243, 238, 0.97);
        --glass-border: rgba(0, 0, 0, 0.10);
      }

      body {
        background: var(--bg-main) !important;
        color: var(--text-main) !important;
        transition: background-color 0.4s ease, color 0.4s ease;
      }
      
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

      /* Focus rings */
      input:focus, textarea:focus {
        outline: none;
        border-color: var(--accent-gold) !important;
        box-shadow: 0 0 0 2px rgba(200, 169, 110, 0.12) !important;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      /* Button active press */
      button:active:not(:disabled) { transform: scale(0.97); }

      /* Selection highlight */
      ::selection { background: rgba(200, 169, 110, 0.25); color: var(--text-main); }

      /* Smooth anchor transitions */
      * { box-sizing: border-box; }

      /* Typing cursor blink */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Skeleton shimmer */
      @keyframes shimmer {
        0% { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .skeleton {
        background: linear-gradient(90deg, var(--bg-panel-hover) 25%, var(--border-main) 50%, var(--bg-panel-hover) 75%);
        background-size: 400px 100%;
        animation: shimmer 1.4s ease-in-out infinite;
        border-radius: 6px;
      }

      /* Fade-in for cards */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fadeUp 0.3s ease both; }

      /* ── Mark / highlight overrides ── */
      mark {
        background: inherit;
        color: inherit;
        transition: background 0.18s, box-shadow 0.18s;
        border-radius: 2px;
      }
      mark:hover { filter: brightness(0.90); cursor: pointer; }

      /* Guaranteed visible highlights in both themes */
      .contract-viewer mark[data-level="high"]   { background: rgba(229,57,53,0.16)  !important; border-bottom: 2.5px solid #E53935 !important; color: inherit !important; }
      .contract-viewer mark[data-level="medium"] { background: rgba(251,140,0,0.15)  !important; border-bottom: 2.5px solid #FB8C00 !important; color: inherit !important; }
      .contract-viewer mark[data-level="low"]    { background: rgba(30,136,229,0.13) !important; border-bottom: 2.5px solid #1E88E5 !important; color: inherit !important; }
      .contract-viewer mark.active[data-level="high"]   { background: #E53935 !important; color: #fff !important; }
      .contract-viewer mark.active[data-level="medium"] { background: #FB8C00 !important; color: #fff !important; }
      .contract-viewer mark.active[data-level="low"]    { background: #1E88E5 !important; color: #fff !important; }

      /* ── Interactive hover states ── */
      /* Sidebar history items */
      [data-sidebar-item]:hover { background: var(--bg-panel) !important; }

      /* Smooth font rendering */
      body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

      /* Tab underline animation */
      button[data-tab] { position: relative; }

      /* Contract viewer paragraph spacing */
      .contract-viewer { max-width: 100%; }

      /* Consistent scrollbar in panel */
      .risk-panel-scroll::-webkit-scrollbar { width: 4px; }
      .risk-panel-scroll::-webkit-scrollbar-thumb { background: var(--border-main); border-radius: 2px; }

      /* ── Mobile responsive overrides ── */
      @media (max-width: 767px) {
        /* Prevent iOS double-tap zoom on buttons */
        button, a { touch-action: manipulation; }

        /* Prevent zoom on input focus (font-size >= 16px) */
        input, textarea, select {
          font-size: 16px !important;
        }

        /* Safe area support for notched phones */
        body {
          padding-bottom: env(safe-area-inset-bottom);
        }

        /* Make scrollbars invisible on mobile */
        ::-webkit-scrollbar { width: 0; height: 0; }

        /* Better tap highlight */
        * { -webkit-tap-highlight-color: rgba(200, 169, 110, 0.15); }

        /* Larger touch targets for mark highlights */
        .contract-viewer mark { padding: 2px 3px !important; }

        /* Bottom nav clearance */
        .mobile-content-area { padding-bottom: 60px; }
      }

      /* iOS momentum scrolling */
      .scroll-ios { -webkit-overflow-scrolling: touch; }
      
      @media print {
        body { background: white !important; color: black !important; padding: 20px !important; }
        /* Hide everything except the actual Risk components */
        button, input, textarea { display: none !important; }
        
        /* Force scrollable containers to perfectly spill their heights for native A4 pagination */
        #root, div { height: auto !important; overflow: visible !important; min-height: auto !important; position: static !important; }
        
        .risk-clause { page-break-inside: avoid; border: 1px solid #ddd !important; background: #fff !important; color: #000 !important; box-shadow: none !important; margin-bottom: 20px !important; }
        .risk-score-box { border: 2px solid #000 !important; background: #fff !important; color: #000 !important; page-break-inside: avoid; }
        h1, h2, h3, h4, span, div, p { color: black !important; }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
