<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEXSCAN — AI Contract Risk Highlighter</title>
    <meta name="description" content="AI-powered contract risk analysis. Upload PDF, DOCX, or TXT contracts and get instant risk highlighting, scoring, and Q&A." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      
      :root {
        --bg-main: #0B0D12;
        --bg-panel: #13161D;
        --bg-panel-hover: #1E2028;
        --border-main: #222530;
        --border-light: #2A2D38;
        --text-main: #E8E4DC;
        --text-muted: #9A9DB0;
        --text-dim: #555A6A;
        --accent-gold: #C8A96E;
        --accent-gold-dark: #8B6914;
        --glass-bg: rgba(11, 13, 18, 0.7);
        --glass-border: rgba(255, 255, 255, 0.05);
      }

      body.light-theme {
        --bg-main: #F4F6F9;
        --bg-panel: #FFFFFF;
        --bg-panel-hover: #F8FAFC;
        --border-main: #E2E8F0;
        --border-light: #CBD5E1;
        --text-main: #0F172A;
        --text-muted: #475569;
        --text-dim: #94A3B8;
        --accent-gold: #A37526;
        --accent-gold-dark: #7A5313;
        --glass-bg: rgba(255, 255, 255, 0.85);
        --glass-border: rgba(0, 0, 0, 0.08);
      }

      body {
        background: var(--bg-main) !important;
        color: var(--text-main) !important;
        transition: background-color 0.4s ease, color 0.4s ease;
      }
      
      @media print {
        body { background: white !important; color: black !important; padding: 20px !important; }
        /* Hide everything except the actual Risk components */
        button, input, textarea { display: none !important; }
        
        /* Force scrollable containers to perfectly spill their heights for native A4 pagination */
        #root, div { height: auto !important; overflow: visible !important; min-height: auto !important; position: static !important; }
        
        .risk-clause { page-break-inside: avoid; border: 1px solid #ddd !important; background: #fff !important; color: #000 !important; box-shadow: none !important; margin-bottom: 20px !important; }
        .risk-score-box { border: 2px solid #000 !important; background: #fff !important; color: #000 !important; page-break-inside: avoid; }
        h1, h2, h3, h4, span, div, p { color: black !important; }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
